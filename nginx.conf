server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression --------------------------------------------------------
    # Origin gzip for text-based responses. Cloudflare additionally applies
    # brotli at the edge for browsers, so origin brotli is redundant here — and
    # ngx_brotli is not bundled in the stock nginx:alpine image anyway.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/xml
        application/rss+xml
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/ttf;
    # text/html is always compressed by nginx and must not be listed here.

    # ---- HTML: always revalidate so new deploys appear immediately ----------
    # The SPA fallback below internally redirects unknown routes to /index.html,
    # which re-matches this exact-match block and inherits the same policy.
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ---- Fingerprinted build assets -----------------------------------------
    # Vite emits every processed asset into /assets/ with an 8-char content hash
    # (e.g. index-BUju0ByF.js, profile-CIOgE70t.webp, GOGOIA-Deco-BDCglKCM.ttf),
    # so the filename changes whenever the content does. `^~` stops nginx from
    # falling through to the media regex below, keeping hashed fonts/images in
    # /assets/ on the one-year immutable policy.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- Non-fingerprinted static media at the site root --------------------
    # e.g. logopf.png, myicon.ico copied verbatim from public/. No content hash,
    # so a conservative one-day cache.
    location ~* \.(png|jpe?g|gif|svg|webp|woff2?|ttf|ico)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ---- SPA fallback -------------------------------------------------------
    # Unknown routes (e.g. /links) serve index.html for client-side routing.
    # No explicit cache directive: falls back to nginx defaults, and the served
    # index.html is governed by the exact-match block above.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
